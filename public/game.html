<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acquire Game</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/game.css">
</head>

<body>
  <header>
    <h2>Acquire Game</h2>
  </header>
  <main>
    <div class="game-state">
      <div class="board">
        <div class="brick flex active">1 <span>A</span></div>
        <div class="brick flex">2 <span>A</span></div>
        <div class="brick flex">3 <span>A</span></div>
        <div class="brick flex">4 <span>A</span></div>
        <div class="brick flex">5 <span>A</span></div>
        <div class="brick flex">6 <span>A</span></div>
        <div class="brick flex">1 <span>B</span></div>
        <div class="brick flex">2 <span>B</span></div>
        <div class="brick flex">3 <span>B</span></div>
        <div class="brick flex">4 <span>B</span></div>
        <div class="brick flex">5 <span>B</span></div>
        <div class="brick flex">6 <span>B</span></div>
        <div class="brick flex">1 <span>C</span></div>
        <div class="brick flex">2 <span>C</span></div>
        <div class="brick flex">3 <span>C</span></div>
        <div class="brick flex">4 <span>C</span></div>
        <div class="brick flex">5 <span>C</span></div>
        <div class="brick flex">6 <span>C</span></div>
        <div class="brick flex">1 <span>D</span></div>
        <div class="brick flex">2 <span>D</span></div>
        <div class="brick flex">3 <span>D</span></div>
        <div class="brick flex">4 <span>D</span></div>
        <div class="brick flex">5 <span>D</span></div>
        <div class="brick flex">6 <span>D</span></div>
        <div class="brick flex">1 <span>E</span></div>
        <div class="brick flex">2 <span>E</span></div>
        <div class="brick flex">3 <span>E</span></div>
        <div class="brick flex">4 <span>E</span></div>
        <div class="brick flex">5 <span>E</span></div>
        <div class="brick flex">6 <span>E</span></div>
        <div class="brick flex">1 <span>F</span></div>
        <div class="brick flex">2 <span>F</span></div>
        <div class="brick flex">3 <span>F</span></div>
        <div class="brick flex">4 <span>F</span></div>
        <div class="brick flex">5 <span>F</span></div>
        <div class="brick flex">6 <span>F</span></div>
      </div>
      <div class="resources">
        <div class="hotels flex">
          <p>All available hotels will shown here</p>
        </div>
        <div class="bricks flex">
          <p>All available bricks will shown here</p>
        </div>
      </div>
    </div>
    <div class="my-stats flex">
      <p>My stats such as bricks, stocks and money will come here </p>
    </div>
  </main>

</body>

</html>
